<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Fond cercle nuit -->
  <circle cx="50" cy="50" r="50" fill="#0F172A"/>

  <!-- Arc émeraude extérieur (~270°) -->
  <path d="M 50 88 A 38 38 0 1 1 88 50"
        stroke="#10B981" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- Arc or intérieur (~180°) -->
  <path d="M 22 68 A 30 30 0 0 1 72 26"
        stroke="#F59E0B" stroke-width="4.5" stroke-linecap="round" fill="none"/>

  <!-- Lettre D géométrique -->
  <path d="M 34 28 L 34 72 M 34 28 Q 44 28 44 28 Q 66 28 66 50 Q 66 72 44 72 L 34 72"
        stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Point doré accent -->
  <circle cx="86" cy="54" r="4.5" fill="#F59E0B"/>
</svg>
