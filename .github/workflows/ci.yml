name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — type-check & tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/daaragest_test
      JWT_SECRET: ci-jwt-secret-min-32-chars-padding-aaa
      QR_SECRET: ci-qr-secret-min-32-chars-padding-bbbb
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install
        working-directory: backend
        run: npm ci
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
      - name: Type-check
        working-directory: backend
        run: npx tsc --noEmit
      - name: Lint
        working-directory: backend
        run: npm run lint
      - name: Tests
        working-directory: backend
        run: npm test
      - name: Build
        working-directory: backend
        run: npx tsc -p tsconfig.json

  integration:
    name: Backend — tests d'intégration (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: daaragest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/daaragest_test
      JWT_SECRET: ci-jwt-secret-min-32-chars-padding-aaa
      QR_SECRET: ci-qr-secret-min-32-chars-padding-bbbb
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install
        working-directory: backend
        run: npm ci
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
      # Le replay des migrations depuis zéro n'est pas garanti (une migration
      # historique référence une colonne supprimée depuis) — on synchronise le
      # schéma courant directement, ce qui suffit aux tests d'intégration.
      - name: Sync schema (db push)
        working-directory: backend
        run: npx prisma db push --skip-generate
      - name: Integration tests
        working-directory: backend
        run: npm run test:integration

  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npx vite build
