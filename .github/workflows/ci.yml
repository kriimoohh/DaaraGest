name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — type-check & tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/daaragest_test
      JWT_SECRET: ci-jwt-secret-min-32-chars-padding-aaa
      QR_SECRET: ci-qr-secret-min-32-chars-padding-bbbb
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install
        working-directory: backend
        run: npm ci
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
      - name: Type-check
        working-directory: backend
        run: npx tsc --noEmit
      - name: Lint (non bloquant le temps de stabiliser le code)
        working-directory: backend
        run: npm run lint || true
      - name: Tests
        working-directory: backend
        run: npm test
      - name: Build
        working-directory: backend
        run: npx tsc -p tsconfig.json

  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npx vite build
